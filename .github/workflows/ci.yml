name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".claude/**"
      - ".env.example"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".claude/**"
      - ".env.example"
      - ".gitignore"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS dev dependencies (jsdom)
        run: npm ci

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format . --check

      - name: Run linting
        run: uv run ruff check .

      - name: Run type checking
        run: uv run mypy juice

      - name: Run JS tests
        run: node --test 'juice/web/**/*.test.js'

      - name: Run tests
        run: uv run pytest

  # Playwright e2e against the cloud-free seeded server. Separate job so the fast
  # quality gate stays fast. ADVISORY for now (continue-on-error) — promote to a
  # required check once it has proven stable over a few runs.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS dev dependencies
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Get Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
